services:
  - type: web
    name: quanton3d-v2
    runtime: node
    buildCommand: >-
      npm install --prefix quanton3dbackend &&
      npm install --prefix quanton3dfrontend &&
      npm run build --prefix quanton3dfrontend
    startCommand: npm start --prefix quanton3dbackend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_CHAT_MODEL
        value: deepseek-chat
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RAG_MIN_RELEVANCE
        value: "0.55"
