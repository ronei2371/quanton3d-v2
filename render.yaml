services:
  - type: web
    name: quanton3d-v2
    runtime: node
    buildCommand: >-
      npm install --prefix quanton3dbackend && npm install --prefix quanton3dfrontend && cd quanton3dfrontend && node -e 'const fs=require("fs");for(const f of ["src/App.jsx","src/App.css"]){let s=fs.readFileSync(f,"utf8").replace(/\r\n/g,"\n").split("\n").filter(l=>!/^\s*codex\//.test(l)&&!/<<<<<<<|=======|>>>>>>>/.test(l)&&l.trim()!=="main").join("\n");if(f.endsWith(".jsx")){const ex="export default App;";const xi=s.indexOf(ex);if(xi>=0)s=s.slice(0,xi+ex.length);s=s.replace(/<p>\s*\?\s*("Veja fotos aprovadas[^\n]+?")\s*:\s*("Envie uma foto real[^\n]+?")\s*<\/p>/g,(_m,_a,b)=>"<p>{"+b+"}</p>");const a=s.indexOf("  const impressoras = Array.from(");const b=s.indexOf("  function selecionarResina",a);if(a>=0&&b>a){const block=`  const impressoras = Array.from(
    new Set(
      parametros
        .filter((item) => chaveResina(item.resina) === chaveResina(resinaSelecionada) && item.impressora)
        .map((item) => (item.marca ? item.marca + " - " + item.impressora : item.impressora))
    )
  ).sort((a, b) => a.localeCompare(b));

  const totalImpressoras = new Set(
    parametros
      .filter((item) => item.impressora)
      .map((item) => (item.marca || "") + "-" + item.impressora)
  ).size;

`;s=s.slice(0,a)+block+s.slice(b)}}fs.writeFileSync(f,s.trimEnd()+"\n")}' && npm run build
    startCommand: npm start --prefix quanton3dbackend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RAG_MIN_RELEVANCE
        value: "0.55"
